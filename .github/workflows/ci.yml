name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build
      # `test:ci` exists in package.json but runs a .ts file directly via `node` —
      # unverified whether this executes correctly outside the original dev environment.
      # Confirm it works locally before adding it here.
